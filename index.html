<!doctype html><html lang="it"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>WC LoVe</title><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"><style>
:root{--pink:#ec3d86;--pink2:#ff7caf;--bg:#fff7fa;--dark:#191217;--muted:#76646d}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:system-ui,-apple-system,Segoe UI,Arial,sans-serif;color:var(--dark)}.top{background:linear-gradient(135deg,#ec3d86,#bd2b71);color:white;padding:22px 18px 30px;display:flex;gap:16px;align-items:center}.logoBox{width:86px;height:86px;border-radius:26px;background:#ee5b96;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 12px 28px #0004}.wc{font-size:36px;font-weight:900;line-height:1}.heart{font-size:30px;color:#ffe8f0;line-height:1}h1{margin:0;font-size:31px}.sub{opacity:.9}main{padding:15px 15px 92px}.view{display:none}.view.active{display:block}h2{margin:6px 0 12px}.panel{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}.search{display:flex;gap:8px;flex:1;min-width:220px}input,select{width:100%;padding:13px;border:1px solid #ead9e0;border-radius:15px;font:inherit;background:white}button{border:0;border-radius:15px;padding:13px 15px;font-weight:800;cursor:pointer}.primary{background:linear-gradient(135deg,var(--pink),#d52777);color:white;box-shadow:0 8px 18px #ec3d8655}.light{background:white;color:#c72e73;border:1px solid #ffd2e2}.notice,.item,.card{background:white;border-radius:24px;padding:16px;margin:11px 0;box-shadow:0 8px 24px #00000012}.notice{color:var(--muted)}#map{height:calc(100vh - 330px);min-height:390px;border-radius:25px;overflow:hidden;box-shadow:0 12px 30px #0002}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.card{max-width:900px;margin:auto}.card label{display:block;font-weight:800;margin:12px 0}.card input,.card select{margin-top:7px;font-weight:400}.rate10{display:grid;grid-template-columns:repeat(10,1fr);gap:6px;margin-top:8px}.rate10 button{padding:10px 0;background:#fff0f6;color:#bf2c70}.rate10 button.sel{background:#ec3d86;color:white}.choice{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}.choice button{background:#fff0f6;color:#bf2c70}.choice button.sel{background:#ec3d86;color:white}.meta{color:var(--muted);font-size:14px}.chips{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px}.chip{background:#fff0f6;color:#9f255e;border-radius:999px;padding:7px 10px;font-size:13px;font-weight:800}.score{float:right;background:#ffe3ee;color:#ec3d86;padding:10px 14px;border-radius:16px;font-size:22px;font-weight:900}.avatar{width:42px;height:42px;border-radius:50%;object-fit:cover;background:#ffe3ee;vertical-align:middle;margin-right:8px}#gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px}#gallery img{width:100%;height:160px;object-fit:cover;border-radius:18px}.profile{text-align:center}.profilePic{width:120px;height:120px;border-radius:50%;object-fit:cover;background:#ffe3ee;border:5px solid #fff;box-shadow:0 8px 24px #0002}.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:14px}.stat{background:#fff0f6;border-radius:18px;padding:14px}nav{position:fixed;left:0;right:0;bottom:0;display:grid;grid-template-columns:repeat(5,1fr);gap:4px;background:#fffffff4;backdrop-filter:blur(12px);padding:8px 6px calc(8px + env(safe-area-inset-bottom));box-shadow:0 -8px 25px #0002;z-index:9999}nav button{background:transparent;color:#71636a;padding:8px 3px}nav button.on{background:#fff0f6;color:#ec3d86}nav span{display:block;font-size:11px;margin-top:2px}@media(max-width:700px){.grid{grid-template-columns:1fr}.rate10{grid-template-columns:repeat(5,1fr)}#map{height:calc(100vh - 365px);min-height:330px}}
</style></head><body><header class="top"><div class="logoBox"><div class="wc">WC</div><div class="heart">♡</div></div><div><h1>WC LoVe</h1><div class="sub">Recensioni bagni</div></div></header><main><section id="mapView" class="view active"><h2>Mappa</h2><div class="notice">Abilita il GPS: sulla mappa compariranno le posizioni dei bagni recensiti. Cliccando su un punto si apre la recensione.</div><div class="panel"><button id="nearBtn" class="primary">Trova bagni vicino a me</button><div class="search"><input id="city" placeholder="Ricerca città o luogo"><button id="cityBtn" class="light">Cerca</button></div></div><div id="map"></div></section><section id="listView" class="view"><h2>Le mie recensioni</h2><div id="list"></div></section><section id="detailView" class="view"><h2>Recensione bagno</h2><div id="detailBox"></div></section><section id="addView" class="view"><form id="form" class="card"><h2>Lascia una recensione</h2><label>Nome luogo<input id="place" required placeholder="Bar Centrale, Stazione..."></label><label>Città / indirizzo<input id="town"></label><label>Valutazione generale <span id="ratingVal">8</span>/10<div class="rate10" id="ratingBtns"></div></label><label>Pulizia <span id="cleanVal">7</span>/10<div class="rate10" id="cleanBtns"></div></label><label>Carta igienica<div class="choice" id="paperBtns"></div></label><label>Tipo bagno<div class="choice" id="typeBtns"></div></label><div class="grid"><label>Foto bagno<input id="photo" type="file" accept="image/*"></label><label>Posizione<button type="button" id="gpsBtn" class="light" style="width:100%;margin-top:7px">Usa posizione GPS</button></label></div><button class="primary" type="submit" style="width:100%;margin-top:12px">Pubblica recensione</button><p id="msg"></p></form></section><section id="galleryView" class="view"><h2>Galleria immagini</h2><div id="gallery"></div></section><section id="rankView" class="view"><h2>Classifica utenti</h2><div id="rank"></div></section><section id="profileView" class="view"><div class="card profile"><h2>Profilo</h2><img id="profilePreview" class="profilePic"><label>Foto profilo<input id="profilePhoto" type="file" accept="image/*"></label><label>Nome utente<input id="username" placeholder="Il tuo nome utente"></label><label>Email<input id="email" type="email" placeholder="la tua email"></label><button id="saveProfile" type="button" class="primary">Salva profilo e verifica email</button><div id="profileMsg" class="meta"></div><div class="stats"><div class="stat"><b id="joined">--</b><br>Iscritto dal</div><div class="stat"><b id="reviewCount">0</b><br>Recensioni</div></div></div></section></main><nav><button data-go="mapView" class="on">🗺️<span>Mappa</span></button><button data-go="listView">🚻<span>Recensioni</span></button><button data-go="addView">➕<span>Recensisci</span></button><button data-go="rankView">🏆<span>Classifica</span></button><button data-go="profileView">👤<span>Profilo</span></button></nav><script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script><script>
let reviews=JSON.parse(localStorage.getItem('wcLoveReviews')||'[]'),profile=JSON.parse(localStorage.getItem('wcLoveProfile')||'{}'),gps=null,map,layer,userMarker;let rating=8,clean=7,paper='Sì',type='WC';const $=id=>document.getElementById(id);function esc(s){return String(s??'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#039;','"':'&quot;'}[m]))}function stars(n){return'★'.repeat(Number(n||0))}function saveReviews(){localStorage.setItem('wcLoveReviews',JSON.stringify(reviews))}function saveProf(){localStorage.setItem('wcLoveProfile',JSON.stringify(profile))}function show(id){document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));$(id).classList.add('active');document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('on',b.dataset.go===id));if(id==='mapView')setTimeout(()=>map.invalidateSize(),200)}function fileData(f){return new Promise((res,rej)=>{let r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(f)})}function getGps(){return new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej,{enableHighAccuracy:true,timeout:12000}))}async function enableGps(){try{let p=await getGps();gps={lat:p.coords.latitude,lng:p.coords.longitude};map.setView([gps.lat,gps.lng],16);renderMap();if(userMarker)userMarker.openPopup();return true}catch(e){alert('GPS non disponibile o permesso negato. Abilita la posizione nel browser.');return false}}function currentUser(){return{userName:profile.name||'Utente locale',userPhoto:profile.photo||'',email:profile.email||''}}function reviewHtml(r,back){return`<div class="item"><div class="score">${esc(r.rating)}<small style="font-size:12px">/10</small></div><h3>${esc(r.place)}</h3><div class="meta">${r.userPhoto?`<img class="avatar" src="${r.userPhoto}">`:'👤'} ${esc(r.userName)} · ${esc(r.date)}</div>${r.photoUrl?`<img src="${r.photoUrl}" style="width:100%;max-height:360px;object-fit:cover;border-radius:18px;margin:12px 0">`:''}<div class="chips"><span class="chip">Valutazione ${stars(r.rating)} ${esc(r.rating)}/10</span><span class="chip">Pulizia ${esc(r.clean)}/10</span><span class="chip">Carta: ${esc(r.paper)}</span><span class="chip">Tipo: ${esc(r.type)}</span></div>${back?`<div class="actions" style="margin-top:14px"><button onclick="show('mapView')" class="primary">Torna alla mappa</button></div>`:''}</div>`}function openReview(i){if(!reviews[i])return;$('detailBox').innerHTML=reviewHtml(reviews[i],true);show('detailView')}function renderMap(){if(!layer)return;layer.clearLayers();reviews.forEach((r,i)=>{if(r.lat&&r.lng){let m=L.marker([r.lat,r.lng]).addTo(layer);m.bindPopup(`<b>${esc(r.place)}</b><br>${esc(r.rating)}/10<br><button onclick="openReview(${i})">Apri recensione</button>`);m.on('click',()=>openReview(i))}});if(gps){userMarker=L.marker([gps.lat,gps.lng]).addTo(layer).bindPopup('Sei qui')}}function renderList(){$('list').innerHTML=reviews.length?reviews.map((r,i)=>`<div onclick="openReview(${i})">${reviewHtml(r,false)}</div>`).join(''):`<div class="item">Nessuna recensione salvata.</div>`}function renderGallery(){let imgs=reviews.filter(r=>r.photoUrl);$('gallery').innerHTML=imgs.length?imgs.map(r=>`<img src="${r.photoUrl}" alt="${esc(r.place)}">`).join(''):`<div class="item">Nessuna foto caricata.</div>`}function renderRank(){let c={};reviews.forEach(r=>c[r.userName]=(c[r.userName]||0)+1);let rows=Object.entries(c).sort((a,b)=>b[1]-a[1]);$('rank').innerHTML=rows.length?rows.map((x,i)=>`<div class="item"><b>${i+1}. ${esc(x[0])}</b><div class="meta">${x[1]} recensioni</div></div>`).join(''):`<div class="item">Nessun utente in classifica.</div>`}function renderProfile(){if(!profile.joined)profile.joined=new Date().toLocaleDateString('it-IT');$('profilePreview').src=profile.photo||'';$('username').value=profile.name||'';$('email').value=profile.email||'';$('joined').textContent=profile.joined;$('reviewCount').textContent=reviews.filter(r=>r.email===profile.email&&profile.email).length||reviews.length}function render(){renderMap();renderList();renderGallery();renderRank();renderProfile()}function setupRate(id,val,cb){let box=$(id);box.innerHTML='';for(let i=1;i<=10;i++){let b=document.createElement('button');b.type='button';b.textContent=i;if(i===val)b.className='sel';b.onclick=()=>{cb(i);setupInputs()};box.appendChild(b)}}function setupChoice(id,arr,val,cb){let box=$(id);box.innerHTML='';arr.forEach(x=>{let b=document.createElement('button');b.type='button';b.textContent=x;if(x===val)b.className='sel';b.onclick=()=>{cb(x);setupInputs()};box.appendChild(b)})}function setupInputs(){setupRate('ratingBtns',rating,v=>rating=v);setupRate('cleanBtns',clean,v=>clean=v);$('ratingVal').textContent=rating;$('cleanVal').textContent=clean;setupChoice('paperBtns',['Sì','No','Carta vetrata','Mano','Foglie'],paper,v=>paper=v);setupChoice('typeBtns',['WC','Turca'],type,v=>type=v)}document.addEventListener('DOMContentLoaded',()=>{map=L.map('map').setView([45.4642,9.19],13);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'}).addTo(map);layer=L.layerGroup().addTo(map);setupInputs();render();setTimeout(enableGps,700);document.querySelectorAll('nav button').forEach(b=>b.onclick=()=>show(b.dataset.go));$('nearBtn').onclick=enableGps;$('gpsBtn').onclick=async()=>{if(await enableGps())$('msg').textContent='Posizione GPS acquisita.'};$('cityBtn').onclick=async()=>{let q=$('city').value.trim();if(!q)return;let res=await fetch('https://nominatim.openstreetmap.org/search?format=json&q='+encodeURIComponent(q));let data=await res.json();if(data[0])map.setView([Number(data[0].lat),Number(data[0].lon)],14)};$('profilePhoto').onchange=async e=>{let f=e.target.files[0];if(f){profile.photo=await fileData(f);$('profilePreview').src=profile.photo}};$('saveProfile').onclick=()=>{profile.name=$('username').value.trim()||'Utente locale';profile.email=$('email').value.trim();if(!profile.joined)profile.joined=new Date().toLocaleDateString('it-IT');saveProf();$('profileMsg').textContent='Profilo salvato. Verifica email simulata nella versione locale.';render()};$('form').onsubmit=async e=>{e.preventDefault();let photoUrl=null,f=$('photo').files[0];if(f)photoUrl=await fileData(f);let u=currentUser();reviews.unshift({place:$('place').value.trim(),town:$('town').value.trim(),rating,clean,paper,type,lat:gps?.lat||null,lng:gps?.lng||null,photoUrl,userName:u.userName,userPhoto:u.userPhoto,email:u.email,date:new Date().toLocaleDateString('it-IT')});saveReviews();render();e.target.reset();$('msg').textContent='Recensione salvata.';show('mapView')}});
</script></body></html>
