<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WC LoVe</title>
<style>
body{font-family:Arial,sans-serif;background:#f5f5f5;text-align:center;margin:0}
header{background:#e85b92;color:white;padding:20px}
.logo{font-size:64px;font-weight:bold}
.heart{font-size:56px;display:block}
main{padding:20px}
.card{background:white;padding:15px;border-radius:12px;max-width:500px;margin:auto}
input,textarea{width:95%;padding:8px;margin:6px 0}
button{background:#e85b92;color:white;border:none;padding:10px 16px;border-radius:8px}
</style>
</head>
<body>
<header>
<div class="logo">WC</div>
<div class="heart">♡</div>
<h2>WC LoVe</h2>
</header>
<main>
<div class="card">
<h3>Recensisci un bagno</h3>
<input placeholder="Nome luogo">
<textarea placeholder="Commento"></textarea>
<button>Invia recensione</button>
</div>
</main>
</body>
</html>
