*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif;background:linear-gradient(160deg,#fff1f6,#eff8ff);color:#251821}.app{max-width:760px;margin:0 auto;min-height:100vh;padding-bottom:86px}.hero{position:sticky;top:0;z-index:4;display:flex;align-items:center;justify-content:space-between;padding:18px;background:rgba(255,255,255,.82);backdrop-filter:blur(14px);border-bottom:1px solid rgba(255,79,139,.18)}.brand{display:flex;gap:12px;align-items:center}.logo{width:58px;height:58px;border-radius:20px;background:linear-gradient(135deg,#ff4f8b,#ffb347);color:white;display:grid;place-items:center;position:relative;box-shadow:0 12px 25px rgba(255,79,139,.28)}.mini{position:absolute;right:8px;bottom:8px}h1{font-size:28px;line-height:1;margin:0}p{line-height:1.4}.brand p{margin:4px 0 0;color:#7b6570}.gps,.primary,.secondary{border:0;border-radius:16px;padding:12px 16px;font-weight:800;display:inline-flex;gap:8px;align-items:center}.gps,.secondary{background:white;color:#ff4f8b;box-shadow:0 6px 18px rgba(0,0,0,.06)}.primary{width:100%;justify-content:center;background:#ff4f8b;color:white;font-size:16px}.card{margin:16px;padding:16px;background:rgba(255,255,255,.9);border-radius:28px;box-shadow:0 20px 55px rgba(0,0,0,.08)}.search{display:flex;align-items:center;gap:8px;background:#f5f1f3;border-radius:16px;padding:10px 12px;margin-bottom:14px}.search input,input,select,textarea{width:100%;border:0;background:white;border-radius:14px;padding:13px;font-size:15px;outline:none}.search input{background:transparent;padding:4px}textarea{min-height:95px;resize:vertical}.fakeMap{height:310px;border-radius:24px;background:radial-gradient(circle at 25% 30%,#fff 0 7%,transparent 8%),linear-gradient(135deg,#c8f1dc,#bcdcff);position:relative;overflow:hidden;border:6px solid white}.fakeMap:before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent 0 42px,rgba(255,255,255,.35) 43px 48px)}.pulse{position:absolute;left:47%;top:48%;font-size:34px;animation:pulse 1.8s infinite;z-index:2}.pin{position:absolute;border:0;border-radius:99px;width:42px;height:42px;background:white;box-shadow:0 8px 18px rgba(0,0,0,.18);font-size:22px;z-index:2}.mapText{position:absolute;left:18px;bottom:16px;background:rgba(255,255,255,.85);padding:10px 12px;border-radius:14px;font-weight:700;z-index:3}.warn{background:#fff2cf;padding:12px;border-radius:14px;color:#735100}.toiletCard{display:flex;gap:12px;margin:12px 0;padding:12px;border-radius:22px;background:#fff;border:1px solid #f1dce4}.toiletCard>img{width:100px;height:100px;object-fit:cover;border-radius:18px}.tcBody{flex:1}.row{display:flex;justify-content:space-between;gap:8px}.delete{border:0;background:#fff1f3;color:#e63d61;border-radius:12px;width:36px;height:36px}h2{margin:2px 0 14px}h3{margin:0}.type{color:#7b6570;margin:4px 0}.stars{display:flex;gap:1px}.stars button{border:0;background:transparent;color:#ddd;padding:2px}.stars button.on{color:#ffb000}.tags{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}.tags span{font-size:12px;background:#fff0f5;color:#d62966;padding:6px 8px;border-radius:99px;font-weight:800}a{color:#ff4f8b;font-weight:800}.form{display:grid;gap:14px}.form label{font-weight:800}.form label input,.form label select,.form label textarea{margin-top:7px}.checks{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.checks label{background:#fff;border:1px solid #f1dce4;padding:12px;border-radius:16px}.coords{display:grid;grid-template-columns:1fr 1fr;gap:10px}.photo{display:flex;align-items:center;justify-content:center;gap:8px;border:2px dashed #ffb0ca;border-radius:18px;padding:16px;color:#ff4f8b}.photo input{display:none}.preview{width:100%;max-height:250px;object-fit:cover;border-radius:22px}.bottom{position:fixed;bottom:0;left:50%;transform:translateX(-50%);max-width:760px;width:100%;display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:10px 12px;background:rgba(255,255,255,.9);backdrop-filter:blur(14px);border-top:1px solid rgba(255,79,139,.16)}.bottom button{border:0;background:transparent;border-radius:18px;padding:10px;color:#8a7780;font-weight:800;display:flex;flex-direction:column;align-items:center;gap:3px}.bottom svg{width:22px}.bottom .active{background:#ff4f8b;color:white}@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.18)}}@media(max-width:520px){.card{margin:10px;border-radius:22px}.toiletCard{flex-direction:column}.toiletCard>img{width:100%;height:180px}.checks{grid-template-columns:1fr}.hero{padding:14px}h1{font-size:24px}}
